services:
  # ── Web API (Express + Socket.IO) ──
  - type: web
    name: vedaai-api
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build --workspace=apps/backend
    startCommand: bash start-web.sh
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_WORKER_MODE
        value: web
      - key: ENABLE_BACKGROUND_WORKERS
        value: "true"
      - key: PORT
        value: "5000"
      - key: FRONTEND_URL
        value: https://vedaai-ed.vercel.app
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_BULLMQ_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: STORAGE_TYPE
        value: local
    disk:
      name: uploads
      mountPath: /opt/render/project/uploads
      sizeGB: 1

  # ── Background Worker (BullMQ) ──
  - type: worker
    name: vedaai-worker
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build --workspace=apps/backend
    startCommand: bash start-worker.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_WORKER_MODE
        value: worker
      - key: ENABLE_BACKGROUND_WORKERS
        value: "true"
      - key: PORT
        value: "5001"
      - key: FRONTEND_URL
        value: https://vedaai-ed.vercel.app
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_BULLMQ_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: STORAGE_TYPE
        value: local
    disk:
      name: uploads
      mountPath: /opt/render/project/uploads
      sizeGB: 1
